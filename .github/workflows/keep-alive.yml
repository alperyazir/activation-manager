name: Supabase Keep-Alive

# Supabase Free tier, 7 gün API/DB aktivitesi olmazsa projeyi duraklatır.
# Bu workflow günde bir kez gerçek bir DB sorgusu atarak sayacı sıfırlar.
#
# NOT: Kullanılan anahtar "publishable" (anon) anahtardır — zaten frontend
# bundle'ında herkese açıktır, gizli değildir. Yine de tercih edersen bir
# repository secret'a taşıyıp ${{ secrets.SUPABASE_ANON_KEY }} ile kullanabilirsin.

on:
  schedule:
    - cron: '0 6 * * *' # her gün 06:00 UTC (09:00 TR)
  workflow_dispatch: {} # elle tetikleme (test için)

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Supabase'e gerçek bir DB sorgusu at
        env:
          SUPABASE_URL: https://rarpucwiyzawfzbitkci.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_J_aAcytHHonxoyAHtGvR2Q_h6rsRid4
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            "${SUPABASE_URL}/rest/v1/sections?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "HTTP status: ${status}"
          if [ "${status}" != "200" ]; then
            echo "Beklenmeyen durum kodu — keep-alive başarısız olabilir."
            exit 1
          fi
          echo "Keep-alive başarılı: Supabase aktif tutuldu."
